<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Media Art - Typographical Fragments</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="frame-container">
        <canvas id="artCanvas"></canvas>
        <div class="intro-text" id="introText">Type something...</div>
        <!-- Hidden input to capture keyboard on all devices easily -->
        <input type="text" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off"
            spellcheck="false">
    </div>

    <script src="script.js"></script>
</body>

</html>
