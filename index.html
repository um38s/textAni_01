<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Media Art - Typographical Fragments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="frame-container">
        <canvas id="artCanvas"></canvas>
        <div class="typing-display" id="typingDisplay">
            <div class="typing-prompt" id="typingPrompt">TRY TYPING</div>
            <div class="typing-input-area">
                <span class="typed-text" id="typedText"></span>
                <span class="blink-cursor" id="blinkCursor">|</span>
            </div>
        </div>
        <input type="text" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off"
            spellcheck="false">
    </div>

    <button id="recBtn" title="Start / Stop Recording">
        <span class="rec-dot"></span>
        <span class="rec-label">REC</span>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
    <script src="script.js" defer></script>
</body>

</html>
